<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TenderHub India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-y: auto;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            border-color: #6366f1;
            transform: translateY(-1px);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-in { animation: slideIn 0.5s ease-out forwards; }
        .toast { 
            position: fixed; top: 100px; right: 20px; z-index: 10000; 
            transform: translateX(400px); transition: all 0.3s ease;
        }
        .navbar { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .error-message {
            background: linear-gradient(90deg, #ef4444, #dc2626);
            border: 1px solid #fca5a5;
            color: white;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .main-content {
            padding-top: 100px;
            padding-bottom: 40px;
        }
        /* 🔥 ADMIN BUTTON STYLES */
        .admin-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            box-shadow: 0 8px 32px rgba(255, 107, 107, 0.4);
        }
        .admin-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 12px 40px rgba(255, 107, 107, 0.6);
        }
    </style>
</head>

<!-- 🔥 NAVBAR WITH ADMIN BUTTON (TOP LEFT) -->
<nav class="navbar fixed top-0 left-0 right-0 z-50 px-4 py-3 lg:px-6 lg:py-4 shadow-2xl">
    <div class="container mx-auto flex justify-between items-center">
        <!-- 🔥 ADMIN LOGIN BUTTON - TOP LEFT -->
        <a href="/admin-login" class="flex items-center space-x-2 bg-white/20 backdrop-blur-sm rounded-xl px-4 py-2 hover:bg-white/30 transition-all admin-btn text-white font-semibold text-sm lg:text-base shadow-lg hover:shadow-xl">
            <i class="fas fa-user-shield text-lg"></i>
            <span>Admin</span>
        </a>
        
        <!-- Logo -->
        <a href="/" class="flex items-center space-x-2 hover:scale-105 transition-all text-white">
            <i class="fas fa-file-contract text-xl lg:text-2xl"></i>
            <span class="text-lg lg:text-xl font-bold">TenderHub</span>
        </a>
        
        <!-- Nav Links -->
        <div class="hidden md:flex items-center space-x-4">
            <a href="/" class="hover:text-indigo-200 font-medium flex items-center space-x-1 text-sm lg:text-base">
                <i class="fas fa-home"></i><span>Home</span>
            </a>
            <a href="/tenders" class="text-indigo-200 font-bold border-b-2 border-indigo-200 pb-1 flex items-center space-x-1 text-sm lg:text-base">
                <i class="fas fa-list"></i><span>Tenders</span>
            </a>
        </div>
    </div>
</nav>

<body class="gradient-bg">
    <!-- Background -->
    <div class="absolute inset-0">
        <div class="absolute top-20 left-10 w-48 h-48 lg:w-64 lg:h-64 bg-white/5 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-20 right-10 w-56 h-56 lg:w-72 lg:h-72 bg-purple-100/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 2s;"></div>
    </div>

    <!-- SMALL COMPACT MAIN -->
    <main class="main-content relative z-10">
        <div class="flex items-center justify-center px-4 py-8 lg:py-12">
            <div class="w-full max-w-md lg:max-w-4xl flex flex-col lg:flex-row items-center gap-6 lg:gap-12">
                
                <!-- COMPACT Branding -->
                <div class="lg:w-1/2 text-center lg:text-left slide-in max-w-sm" style="animation-delay: 0.1s;">
                    <div class="flex items-center justify-center lg:justify-start mb-6">
                        <div class="w-14 h-14 lg:w-16 lg:h-16 bg-gradient-to-r from-indigo-400 to-purple-500 rounded-2xl flex items-center justify-center shadow-xl mr-3 lg:mr-4">
                            <i class="fas fa-file-contract text-lg lg:text-xl text-white"></i>
                        </div>
                        <span class="text-2xl lg:text-3xl font-black bg-gradient-to-r from-white to-indigo-50 bg-clip-text">TenderHub</span>
                    </div>
                    <h1 class="text-xl lg:text-2xl xl:text-3xl font-black mb-4 text-white leading-tight">
                        #1 Government<br><span class="text-yellow-300 text-xl lg:text-2xl">Tenders</span>
                    </h1>
                    <div class="space-y-2 text-sm lg:text-base text-white/90">
                        <p class="flex items-center justify-center lg:justify-start"><i class="fas fa-database text-green-400 mr-2 text-lg"></i>135+ Portals</p>
                        <p class="flex items-center justify-center lg:justify-start"><i class="fas fa-heart text-red-400 mr-2 text-lg"></i>Favorites</p>
                        <p class="flex items-center justify-center lg:justify-start"><i class="fas fa-bell text-blue-400 mr-2 text-lg"></i>Alerts</p>
                    </div>
                </div>

                <!-- SMALL COMPACT FORM -->
                <div class="w-full lg:w-1/2 max-w-md glass-effect rounded-2xl lg:rounded-3xl p-6 lg:p-8 shadow-2xl slide-in border" style="animation-delay: 0.2s;">
                    
                    <!-- ERROR DISPLAY -->
                    <div id="errorContainer" class="hidden mb-4 p-3 rounded-xl error-message text-sm font-medium flex items-center space-x-2">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span id="errorMessage"></span>
                    </div>

                    <!-- Header -->
                    <div class="text-center mb-6 lg:mb-8">
                        <div class="w-14 h-14 lg:w-16 lg:h-16 mx-auto mb-4 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-xl">
                            <i class="fas fa-user-shield text-lg lg:text-xl text-white"></i>
                        </div>
                        <h2 id="pageTitle" class="text-2xl lg:text-3xl font-black text-gray-800 mb-1">Welcome Back</h2>
                        <p id="pageSubtitle" class="text-base lg:text-lg text-gray-600 font-medium">Access your dashboard</p>
                    </div>

                    <!-- Loading -->
                    <div id="loadingSpinner" class="hidden absolute inset-0 bg-white/95 backdrop-blur-md rounded-2xl flex items-center justify-center z-20">
                        <div class="text-center">
                            <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-500 rounded-full animate-spin mx-auto mb-3"></div>
                            <p class="text-lg font-semibold text-gray-700">Processing...</p>
                        </div>
                    </div>

                    <!-- FORM -->
                    <form id="authForm" class="space-y-4 relative z-10">
                        <!-- Name Field -->
                        <div id="nameFieldContainer" class="hidden">
                            <div class="relative">
                                <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                                <input type="text" id="nameInput" 
                                    class="w-full pl-11 pr-4 py-3 text-base border border-gray-200 rounded-xl focus:outline-none input-focus transition-all shadow-sm bg-white/90"
                                    placeholder="Full Name">
                            </div>
                        </div>

                        <!-- Email -->
                        <div>
                            <div class="relative">
                                <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                                <input type="email" id="emailInput" required
                                    class="w-full pl-11 pr-4 py-3 text-base border border-gray-200 rounded-xl focus:outline-none input-focus transition-all shadow-sm bg-white/90"
                                    placeholder="Email">
                            </div>
                        </div>

                        <!-- Password -->
                        <div>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                                <input type="password" id="passwordInput" required
                                    class="w-full pl-11 pr-12 py-3 text-base border border-gray-200 rounded-xl focus:outline-none input-focus transition-all shadow-sm bg-white/90"
                                    placeholder="Password">
                                <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 hover:bg-gray-100 rounded-lg transition-all">
                                    <i class="fas fa-eye text-gray-500 text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Submit -->
                        <button type="submit" id="submitBtn"
                            class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold py-3 px-6 rounded-xl text-base shadow-lg hover:shadow-xl transition-all flex items-center justify-center space-x-2">
                            <span id="submitText">Sign In</span>
                            <i class="fas fa-arrow-right text-sm"></i>
                        </button>

                        <!-- Toggle -->
                        <div class="pt-4 border-t border-gray-100 text-center">
                            <button type="button" id="toggleMode"
                                class="text-sm font-semibold text-indigo-600 hover:text-indigo-700 bg-white/70 hover:bg-white px-6 py-2.5 rounded-xl transition-all shadow-sm hover:shadow-md w-full">
                                <span id="toggleText">No account?</span> <strong id="toggleAction">Sign Up</strong>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer"></div>

    <!-- 🔥 FIREBASE WITH ERROR HANDLING (UNCHANGED) -->
    <script type="module">
    // 🔥 COMPLETE FIRESTORE AUTH SCRIPT - FULLY WORKING 2026
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // 🔥 YOUR FIREBASE CONFIG (Firestore ready)
    const firebaseConfig = {
        apiKey: "AIzaSyBnrDnOHIi3oNE9bGBDc2IGt64fZiJgpbQ",
        authDomain: "blink-c30fa.firebaseapp.com",
        projectId: "blink-c30fa",
        storageBucket: "blink-c30fa.firebasestorage.app",
        messagingSenderId: "37798724346",
        appId: "1:37798724346:web:4374e9cfad34dbd69eff43"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 🔥 ALL ELEMENTS
    const elements = {
        authForm: document.getElementById('authForm'),
        emailInput: document.getElementById('emailInput'),
        passwordInput: document.getElementById('passwordInput'),
        nameInput: document.getElementById('nameInput'),
        nameFieldContainer: document.getElementById('nameFieldContainer'),
        togglePassword: document.getElementById('togglePassword'),
        submitBtn: document.getElementById('submitBtn'),
        toggleMode: document.getElementById('toggleMode'),
        pageTitle: document.getElementById('pageTitle'),
        pageSubtitle: document.getElementById('pageSubtitle'),
        submitText: document.getElementById('submitText'),
        toggleText: document.getElementById('toggleText'),
        toggleAction: document.getElementById('toggleAction'),
        errorContainer: document.getElementById('errorContainer'),
        errorMessage: document.getElementById('errorMessage'),
        loadingSpinner: document.getElementById('loadingSpinner')
    };

    let isLoginMode = true;

    // 🔥 MAIN FORM HANDLER - FIRESTORE VERSION
    elements.authForm.onsubmit = async (e) => {
        e.preventDefault();
        clearError();

        const email = elements.emailInput.value.trim();
        const password = elements.passwordInput.value;
        const name = elements.nameInput.value.trim();

        // VALIDATION
        if (!email || !password) {
            showError('Please fill all required fields');
            return;
        }

        if (!isLoginMode && (!name || name.length < 2)) {
            showError('Please enter your full name (2+ characters)');
            return;
        }

        if (password.length < 6) {
            showError('Password must be at least 6 characters');
            return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showError('Please enter valid email');
            return;
        }

        showLoading(true);

        try {
            let userCredential;

            if (isLoginMode) {
                // 🔥 LOGIN
                userCredential = await signInWithEmailAndPassword(auth, email, password);
                showToast('Welcome back!', 'success');
            } else {
                // 🔥 SIGNUP + FIRESTORE SAVE
                userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // Update Firebase Auth profile
                await updateProfile(userCredential.user, {
                    displayName: name
                });

                // 🔥 SAVE TO YOUR FIRESTORE (users collection)
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    uid: userCredential.user.uid,
                    email: email,
                    displayName: name,
                    createdAt: Date.now(),
                    isPro: false,
                    favorites: [],
                    searchHistory: [],
                    lastLogin: Date.now()
                });

                showToast('Account created successfully!', 'success');
            }

            // 🔥 SAVE SESSION FOR HOMEPAGE
            localStorage.setItem('tenderhub_user', JSON.stringify({
                uid: userCredential.user.uid,
                email: email,
                displayName: name || email.split('@')[0]
            }));

            // Redirect to homepage
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);

        } catch (error) {
            console.error('Auth error:', error);
            const message = getErrorMessage(error.code);
            showError(message);
            showToast(message, 'error');
        } finally {
            showLoading(false);
        }
    };

    // 🔥 ERROR MESSAGES
    function getErrorMessage(code) {
        const messages = {
            'auth/user-not-found': 'No account found with this email',
            'auth/wrong-password': 'Incorrect password',
            'auth/email-already-in-use': 'Email already registered. Please sign in.',
            'auth/weak-password': 'Password must be at least 6 characters',
            'auth/invalid-email': 'Please enter valid email',
            'auth/too-many-requests': 'Too many attempts. Try again later.',
            'auth/network-request-failed': 'Network error. Check connection.'
        };
        return messages[code] || 'Something went wrong. Try again.';
    }

    // 🔥 TOGGLE PASSWORD VISIBILITY
    elements.togglePassword.onclick = () => {
        const type = elements.passwordInput.type === 'password' ? 'text' : 'password';
        elements.passwordInput.type = type;
        const icon = elements.togglePassword.querySelector('i');
        icon.className = type === 'password' ? 
            'fas fa-eye text-gray-500 text-sm' : 'fas fa-eye-slash text-gray-500 text-sm';
    };

    // 🔥 TOGGLE LOGIN/SIGNUP MODE
    elements.toggleMode.onclick = () => {
        clearError();
        isLoginMode = !isLoginMode;
        updateModeUI();
    };

    function updateModeUI() {
        if (isLoginMode) {
            // LOGIN MODE
            elements.pageTitle.textContent = 'Welcome Back';
            elements.pageSubtitle.textContent = 'Access your dashboard';
            elements.submitText.textContent = 'Sign In';
            elements.toggleText.textContent = 'No account?';
            elements.toggleAction.textContent = 'Sign Up';
            elements.nameFieldContainer.classList.add('hidden');
            elements.nameInput.required = false;
        } else {
            // SIGNUP MODE
            elements.pageTitle.textContent = 'Create Account';
            elements.pageSubtitle.textContent = 'Join thousands of contractors';
            elements.submitText.textContent = 'Create Account';
            elements.toggleText.textContent = 'Have account?';
            elements.toggleAction.textContent = 'Sign In';
            elements.nameFieldContainer.classList.remove('hidden');
            elements.nameInput.required = true;
            elements.nameInput.focus();
        }
    }

    // 🔥 UTILITY FUNCTIONS
    function showError(message) {
        elements.errorMessage.textContent = message;
        elements.errorContainer.classList.remove('hidden');
        elements.errorContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function clearError() {
        elements.errorContainer.classList.add('hidden');
    }

    function showLoading(show) {
        elements.loadingSpinner.classList.toggle('hidden', !show);
        elements.authForm.style.opacity = show ? '0.6' : '1';
        elements.authForm.style.pointerEvents = show ? 'none' : 'auto';
        elements.submitBtn.disabled = show;
    }

    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast p-4 rounded-2xl shadow-2xl text-white font-semibold text-sm lg:text-base fixed top-24 right-6 z-[10000] flex items-center space-x-3 transform translate-x-96 transition-all duration-300 ${
            type === 'error' ? 'bg-gradient-to-r from-red-500 to-red-600' : 
            type === 'success' ? 'bg-gradient-to-r from-emerald-500 to-emerald-600' : 
            'bg-gradient-to-r from-indigo-500 to-purple-600'
        }`;
        
        toast.innerHTML = `
            <i class="fas fa-${type === 'error' ? 'exclamation-triangle' : type === 'success' ? 'check-circle' : 'info-circle'}"></i>
            <span>${message}</span>
        `;
        
        document.body.appendChild(toast);
        setTimeout(() => toast.style.transform = 'translateX(0)', 100);
        
        setTimeout(() => {
            toast.style.transform = 'translateX(96)';
            setTimeout(() => toast.remove(), 300);
        }, 3500);
    }

    // 🔥 CLEAR ERRORS ON INPUT
    elements.emailInput.addEventListener('input', clearError);
    elements.passwordInput.addEventListener('input', clearError);
    elements.nameInput.addEventListener('input', clearError);

    // 🔥 AUTO FOCUS ON LOAD
    elements.emailInput.focus();

    console.log('🚀 TenderHub Auth - Firestore Ready & Production Optimized!');
    console.log('✅ Login/Signup → Firestore users/{uid} → Homepage Profile');
    </script>
</body>
</html>
