<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TenderHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .profile-img { max-width: 150px; max-height: 150px; object-fit: cover; }
        .loading { border: 3px solid #f3f4f6; border-top: 3px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-50 min-h-screen py-12 px-4">
    
    <!-- Navbar -->
    <nav class="max-w-4xl mx-auto mb-12 bg-white/80 backdrop-blur-md rounded-2xl shadow-xl border p-6 flex justify-between items-center">
        <a href="/" class="flex items-center gap-3 text-2xl font-bold text-indigo-600">
            <i class="fas fa-file-contract text-3xl"></i> TenderHub
        </a>
        <div class="flex gap-4">
            <a href="/tenders" class="text-gray-600 hover:text-indigo-600 flex items-center gap-2">
                <i class="fas fa-list"></i> Tenders
            </a>
            <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-xl hover:bg-red-600 flex items-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto">
        <!-- Loading Screen -->
        <div id="loadingScreen" class="text-center py-20">
            <div class="loading mx-auto mb-4"></div>
            <p class="text-lg text-gray-600">Loading profile...</p>
        </div>

        <!-- Profile Content -->
        <div id="profileContent" class="hidden">
            <!-- Profile Header -->
            <div class="bg-white rounded-3xl shadow-2xl p-8 mb-8 text-center">
                <div class="mb-6">
                    <div class="relative inline-block profile-avatar-container">
                        <img id="profileImg" src="https://via.placeholder.com/150?text=👤" alt="Profile" class="profile-img rounded-full border-4 border-indigo-200 shadow-2xl mx-auto mb-4 cursor-pointer hover:scale-105 transition-all">
                        <label for="imageInput" class="absolute bottom-2 right-2 bg-indigo-500 text-white p-3 rounded-full cursor-pointer hover:bg-indigo-600 transition-all shadow-lg">
                            <i class="fas fa-camera text-sm"></i>
                        </label>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                    </div>
                    <h1 id="displayName" class="text-4xl font-bold text-gray-900 mb-2">Loading...</h1>
                    <p id="userEmail" class="text-xl text-gray-600 mb-4">Loading...</p>
                    <span id="userPlan" class="px-6 py-2 rounded-full bg-gradient-to-r from-gray-500 to-gray-600 text-white font-semibold">Loading...</span>
                </div>
            </div>

            <!-- Edit Form -->
            <div id="editForm" class="bg-white rounded-3xl shadow-2xl p-8 mb-8 hidden">
                <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">Edit Profile</h2>
                <form id="profileForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Display Name</label>
                        <input type="text" id="formName" required class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                        <input type="tel" id="formPhone" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Company</label>
                        <input type="text" id="formCompany" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                        <input type="text" id="formLocation" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                    </div>
                    <div class="flex gap-4 pt-4">
                        <button type="submit" class="flex-1 bg-indigo-600 text-white py-3 px-6 rounded-xl hover:bg-indigo-700 font-semibold flex items-center justify-center gap-2">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <button type="button" onclick="cancelEdit()" class="flex-1 bg-gray-500 text-white py-3 px-6 rounded-xl hover:bg-gray-600 font-semibold flex items-center justify-center gap-2">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- Profile Stats -->
            <div class="grid md:grid-cols-3 gap-6 mb-8">
                <div class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white p-8 rounded-3xl text-center shadow-2xl">
                    <i class="fas fa-file-contract text-4xl mb-4 block"></i>
                    <div class="text-3xl font-bold" id="savedTenders">0</div>
                    <div class="text-blue-100">Saved Tenders</div>
                </div>
                <div class="bg-gradient-to-r from-green-500 to-emerald-600 text-white p-8 rounded-3xl text-center shadow-2xl">
                    <i class="fas fa-bell text-4xl mb-4 block"></i>
                    <div class="text-3xl font-bold" id="activeAlerts">0</div>
                    <div class="text-green-100">Active Alerts</div>
                </div>
                <div class="bg-gradient-to-r from-purple-500 to-pink-600 text-white p-8 rounded-3xl text-center shadow-2xl">
                    <i class="fas fa-star text-4xl mb-4 block"></i>
                    <div class="text-3xl font-bold" id="winRate">0%</div>
                    <div class="text-purple-100">Success Rate</div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="bg-white rounded-3xl shadow-2xl p-8">
                <h3 class="text-2xl font-bold text-gray-900 mb-6">Quick Actions</h3>
                <div class="grid md:grid-cols-2 gap-4">
                    <button onclick="editProfile()" class="bg-indigo-600 text-white p-6 rounded-2xl hover:bg-indigo-700 font-semibold flex items-center justify-center gap-3 shadow-xl hover:shadow-2xl transition-all">
                        <i class="fas fa-edit text-xl"></i> Edit Profile
                    </button>
                    <a href="/tenders" class="bg-green-600 text-white p-6 rounded-2xl hover:bg-green-700 font-semibold flex items-center justify-center gap-3 shadow-xl hover:shadow-2xl transition-all">
                        <i class="fas fa-search text-xl"></i> Find Tenders
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let originalProfileData = {};

        // 🔥 FLASK COOKIE AUTH CHECK
        function checkFlaskAuth() {
            const authToken = document.cookie.split('; ')
                .find(row => row.startsWith('auth_token='));
            
            if (!authToken) {
                window.location.href = '/auth';
                return false;
            }
            
            const token = authToken.split('=')[1];
            if (token.startsWith('demo_')) {
                currentUser = {
                    uid: token.replace('demo_', ''),
                    email: token.replace('demo_', '') + '@demo.com'
                };
                return true;
            }
            
            window.location.href = '/auth';
            return false;
        }

        // 🔥 LOAD USER DATA FROM FLASK API
        async function loadUserData() {
            try {
                const response = await fetch(`/api/auth/me?userId=${currentUser.uid}`, {
                    credentials: 'include'  // Send cookies to API
                });
                
                if (!response.ok) {
                    window.location.href = '/auth';
                    return;
                }
                
                const data = await response.json();
                
                // Populate profile
                document.getElementById('displayName').textContent = data.displayName || 'User';
                document.getElementById('userEmail').textContent = data.email;
                document.getElementById('userPlan').textContent = data.plan;
                
                document.getElementById('userPlan').className = data.isPro ?
                    'px-6 py-2 rounded-full bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold' :
                    'px-6 py-2 rounded-full bg-gradient-to-r from-gray-500 to-gray-600 text-white font-semibold';
                
                originalProfileData = data;
                
                // Hide loading, show content
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('profileContent').classList.remove('hidden');
                
            } catch (error) {
                console.error('Profile load error:', error);
                window.location.href = '/auth';
            }
        }

        // 🔥 EDIT PROFILE
        function editProfile() {
            document.getElementById('formName').value = document.getElementById('displayName').textContent;
            document.getElementById('formPhone').value = originalProfileData.phone || '';
            document.getElementById('formCompany').value = originalProfileData.company || '';
            document.getElementById('formLocation').value = originalProfileData.location || '';
            document.getElementById('editForm').classList.remove('hidden');
        }

        // 🔥 CANCEL EDIT
        function cancelEdit() {
            document.getElementById('editForm').classList.add('hidden');
        }

        // 🔥 SAVE PROFILE
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const updates = {
                displayName: document.getElementById('formName').value,
                phone: document.getElementById('formPhone').value,
                company: document.getElementById('formCompany').value,
                location: document.getElementById('formLocation').value
            };

            try {
                const response = await fetch('/api/profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(updates)
                });
                
                if (response.ok) {
                    document.getElementById('displayName').textContent = updates.displayName;
                    originalProfileData = { ...originalProfileData, ...updates };
                    cancelEdit();
                    showToast('Profile updated successfully!');
                } else {
                    showToast('Update failed', 'error');
                }
            } catch (error) {
                console.error('Error updating profile:', error);
                showToast('Error updating profile', 'error');
            }
        });

        // 🔥 LOGOUT
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                document.cookie = 'auth_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                window.location.href = '/auth';
            }
        }

        // 🔥 TOAST NOTIFICATION
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 p-4 rounded-xl shadow-2xl z-50 transform transition-all ${
                type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'
            }`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 🔥 INIT APP
        window.addEventListener('load', async () => {
            if (checkFlaskAuth()) {
                await loadUserData();
            }
        });
    </script>
</body>
</html>
